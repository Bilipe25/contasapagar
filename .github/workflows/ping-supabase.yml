name: Ping Supabase - Evitar pausa

on:
  schedule:
    - cron: '0 12 * * 1,4'  # Toda segunda e quinta às 12h UTC (9h Brasília)
  workflow_dispatch:          # Permite rodar manualmente também

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer ping no Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Fazendo ping no Supabase..."
          curl -s \
            "$SUPABASE_URL/rest/v1/bancos?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
          echo "Ping enviado com sucesso!"
